<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="26" fill="#E6F1FB"/>

  <!-- Body mesin cuci -->
  <rect x="24" y="22" width="80" height="68" rx="10" fill="#185FA5"/>

  <!-- Panel atas -->
  <rect x="24" y="22" width="80" height="20" rx="10" fill="#0C447C"/>
  <rect x="24" y="32" width="80" height="10" fill="#0C447C"/>

  <!-- Tombol panel -->
  <circle cx="37" cy="32" r="4" fill="#378ADD"/>
  <circle cx="50" cy="32" r="4" fill="#85B7EB" opacity="0.5"/>

  <!-- Aksen express (amber) -->
  <rect x="82" y="26" width="14" height="8" rx="3" fill="#EF9F27"/>

