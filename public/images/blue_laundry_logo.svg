  <!-- Gelombang air bawah -->
  <path d="M28 96 Q46 88 64 94 Q82 100 100 92" stroke="#185FA5" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M28 104 Q46 96 64 102 Q82 108 100 100" stroke="#85B7EB" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
